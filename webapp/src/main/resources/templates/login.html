<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EstudiaYa</title>

   <link rel="stylesheet" th:href="@{/login.css}" href="/login.css">
</head>
<body>

<main class="card">
    <h1>Iniciar sesión</h1>
    <p>Accede a tu cuenta de EstudiaYa para continuar con tu progreso.</p>

    <div class="msg error" th:if="${param.error}">
        Email o contraseña inválidos.
    </div>

    <div class="msg ok" th:if="${param.logout}">
        Sesión cerrada correctamente.
    </div>

    <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label class="field">
            <span>Email</span>
            <input type="email" name="username" autocomplete="username" required>
        </label>

        <label class="field">
            <span>Contraseña</span>
            <input type="password" name="password" autocomplete="current-password" required>
        </label>

        <button type="submit">Entrar</button>
    </form>

    <div class="hint">
        Demo: <strong>carlos@estudiaya.pe</strong> / <strong>123456</strong>
    </div>
</main>

</body>
</html>
