<section class="login-page">
  <main class="login-card">
    <p class="brand">EstudiaYa</p>
    <h1>Iniciar sesion</h1>
    <p class="intro">Accede a tu cuenta para continuar con tu progreso.</p>

    @if (mensajeError()) {
      <div class="message error">{{ mensajeError() }}</div>
    }

    @if (mensajeOk()) {
      <div class="message ok">{{ mensajeOk() }}</div>
    }

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          name="email"
          autocomplete="email"
          placeholder="tu@email.com"
          required
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          [disabled]="cargando()"
        >
      </label>

      <label class="field">
        <span>Contrasena</span>
        <div class="password-wrapper">
          <input
            [type]="verPassword ? 'text' : 'password'"
            name="password"
            autocomplete="current-password"
            placeholder="Tu contrasena"
            required
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            [disabled]="cargando()"
          >
          <button
            type="button"
            class="toggle-password"
            (click)="verPassword = !verPassword"
            tabindex="-1"
            [attr.aria-label]="verPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
          >
            <i class="fa-solid" [ngClass]="verPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </label>

      <button type="submit" [disabled]="cargando() || loginForm.invalid">
        {{ cargando() ? 'Ingresando...' : 'Entrar' }}
      </button>
    </form>

    <p class="hint">No tienes cuenta? <a routerLink="/registrate">Registrate</a></p>
  </main>
</section>
